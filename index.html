<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Checkers — AI Coach Arena</title>
    <style>
      :root {
        color-scheme: dark;
        --hud-bg: rgba(10, 14, 22, 0.82);
        --hud-border: rgba(120, 140, 170, 0.35);
        --hud-fg: #d8e2ee;
        --hud-accent: #6fd0ff;
        --bottom-panel-h: 170px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #05070b; color: var(--hud-fg); font-family: "Inter", system-ui, sans-serif; overflow: hidden; user-select: none; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      .overlay { position: absolute; inset: 0; pointer-events: none; }
      .overlay > * { pointer-events: auto; }

      /* Menu */
      .menu {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #1a2336 0%, #05070b 70%);
        z-index: 10;
      }
      .menu-panel { background: var(--hud-bg); border: 1px solid var(--hud-border); padding: 32px 40px; border-radius: 12px; max-width: 780px; width: 90%; }
      .menu h1 { margin: 0 0 6px 0; font-size: 28px; letter-spacing: 0.06em; }
      .menu h1 .accent { color: var(--hud-accent); }
      .menu p { margin: 0 0 24px 0; opacity: 0.7; font-size: 13px; line-height: 1.5; }
      .section-label { margin-top: 18px; margin-bottom: 8px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.55; }
      .mode-row { display: flex; gap: 12px; margin-bottom: 4px; }
      .mode-card { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--hud-border); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: background 120ms, border-color 120ms; }
      .mode-card:hover { background: rgba(255,255,255,0.07); border-color: var(--hud-accent); }
      .mode-card h3 { margin: 0 0 3px 0; font-size: 14px; }
      .mode-card .desc { font-size: 11px; opacity: 0.75; line-height: 1.4; }
      .faction-row { display: flex; gap: 14px; flex-wrap: wrap; }
      .faction-card { flex: 1 1 200px; background: rgba(255,255,255,0.03); border: 1px solid var(--hud-border); border-radius: 8px; padding: 14px; cursor: pointer; transition: background 120ms, border-color 120ms; }
      .faction-card:hover { background: rgba(255,255,255,0.07); border-color: var(--hud-accent); }
      .faction-card h3 { margin: 0 0 4px 0; font-size: 15px; }
      .faction-card .tag { font-size: 11px; opacity: 0.7; display: block; margin-bottom: 8px; }
      .faction-card .desc { font-size: 12px; line-height: 1.4; opacity: 0.85; }
      .menu-actions { margin-top: 24px; display: flex; align-items: center; gap: 14px; }
      .menu-actions .hint { font-size: 12px; opacity: 0.6; flex: 1; }
      .btn { background: var(--hud-accent); color: #041321; border: 0; padding: 10px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; }
      .btn.secondary { background: rgba(255,255,255,0.08); color: var(--hud-fg); border: 1px solid var(--hud-border); }
      .btn.secondary:hover { border-color: #ff8a55; color: #ffd0b8; }
      .btn.secondary.purple:hover { border-color: #b28cff; color: #eadfff; }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }

      /* HUD */
      .hud-top { position: absolute; top: 12px; left: 16px; right: 16px; display: flex; justify-content: flex-start; gap: 12px; pointer-events: none; }
      .hud-resources { font-size: 13px; display: flex; gap: 18px; text-shadow: 0 1px 3px rgba(0,0,0,0.95); }
      .hud-resources .metric { display: flex; flex-direction: column; }
      .hud-resources .label { font-size: 10px; opacity: 0.7; letter-spacing: 0.08em; text-transform: uppercase; }
      .hud-resources .value { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }
      .hud-resources .value.low { color: #ff8a8a; }
      .hud-minimap { width: 170px; height: var(--bottom-panel-h); background: var(--hud-bg); border: 1px solid var(--hud-border); border-radius: 6px; padding: 4px; }
      .hud-minimap canvas { display: block; width: 160px; height: 160px; border-radius: 4px; }

      /* Command card (bottom-right) */
      .hud-bottom { position: absolute; bottom: 12px; left: 12px; right: 12px; display: flex; align-items: end; justify-content: space-between; gap: 24px; }
      .hud-left,
      .hud-right { display: flex; align-items: end; gap: 12px; min-width: 0; }
      .hud-left { justify-content: flex-start; max-width: min(760px, calc(100vw - 520px)); }
      .hud-right { justify-content: flex-end; flex: 0 0 auto; }
      .selection-info { padding: 0 0 4px 0; font-size: 12px; border-bottom: 1px solid rgba(120, 140, 170, 0.22); }
      .selection-info h4 { margin: 0 0 4px 0; font-size: 13px; }
      .selection-info .meta { opacity: 0.75; font-size: 11px; line-height: 1.35; }

      /* Middle HUD panel — queues + unit avatars */
      .hud-middle { width: clamp(340px, 32vw, 540px); background: var(--hud-bg); border: 1px solid var(--hud-border); border-radius: 6px; padding: 8px 10px; display: flex; flex-direction: column; gap: 8px; min-height: 60px; max-height: var(--bottom-panel-h); overflow: hidden; }
      .hud-middle .mid-section { display: flex; flex-direction: column; gap: 4px; }
      .hud-middle .mid-title { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.55; }
      .hud-middle .tile-row { display: flex; gap: 5px; flex-wrap: wrap; }
      .hud-middle .q-tile { position: relative; width: 46px; height: 46px; border: 1px solid var(--hud-border); border-radius: 4px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .hud-middle .q-tile.active { border-color: var(--hud-accent); }
      .hud-middle .q-tile svg { width: 26px; height: 26px; }
      /* Horizontal progress strip under the icon (replaces the old vertical bar on the command card). */
      .hud-middle .q-progress-track { position: absolute; left: 3px; right: 3px; bottom: 3px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; pointer-events: none; }
      .hud-middle .q-progress-track .q-progress-fill { height: 100%; width: 0%; background: var(--hud-accent); box-shadow: 0 0 6px var(--hud-accent); transition: width 160ms linear; }
      .hud-middle .q-tile .q-index { position: absolute; top: 1px; left: 4px; font-size: 9px; opacity: 0.6; }
      .hud-middle .avatar-tile { position: relative; width: 46px; height: 46px; border: 1px solid var(--hud-border); border-radius: 4px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; cursor: pointer; }
      .hud-middle .avatar-tile:hover { background: rgba(255,255,255,0.09); border-color: var(--hud-accent); }
      .hud-middle .avatar-tile svg { width: 28px; height: 28px; }
      .hud-middle .avatar-tile .a-count { position: absolute; bottom: 2px; right: 4px; font-size: 10px; font-weight: 700; color: var(--hud-accent); }
      .hud-middle .avatar-tile .hp-mini { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(0,0,0,0.4); }
      .hud-middle .avatar-tile .hp-mini .fill { height: 100%; }
      .hud-middle .empty { opacity: 0.45; font-size: 11px; padding: 6px 0; }
      .blueprint-panel { width: 190px; height: var(--bottom-panel-h); background: rgba(7, 10, 16, 0.9); border: 1px solid var(--hud-border); border-radius: 6px; padding: 8px; box-shadow: inset 0 0 18px rgba(111,208,255,0.05); overflow: hidden; }
      .bp-card { height: 100%; display: flex; flex-direction: column; gap: 7px; }
      .bp-frame { position: relative; height: 108px; border: 1px solid rgba(120,140,170,0.28); border-radius: 5px; overflow: hidden; background: #05070b; }
      .bp-svg { display: block; width: 100%; height: 100%; }
      .bp-scanline { position: absolute; inset: 0; pointer-events: none; background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent 2px); background-size: 100% 7px; mix-blend-mode: screen; opacity: 0.18; }
      .bp-copy { min-width: 0; }
      .bp-name { font-size: 12px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .bp-sub { margin-top: 2px; font-size: 10px; opacity: 0.65; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .bp-hp { margin-top: 6px; height: 4px; border-radius: 2px; overflow: hidden; background: rgba(255,255,255,0.08); }
      .bp-hp div { height: 100%; box-shadow: 0 0 8px currentColor; transition: width 120ms linear; }
      .bp-vanguard .bp-name { color: #9ec8ff; }
      .bp-swarm .bp-name { color: #ffcf8a; }
      .bp-titan .bp-name { color: #d7c2ff; }
      .bp-empty .bp-name { color: #94a3b8; }
      .command-card { width: 248px; height: var(--bottom-panel-h); align-content: start; background: var(--hud-bg); border: 1px solid var(--hud-border); border-radius: 6px; padding: 10px; display: grid; grid-template-columns: repeat(4, 52px); grid-auto-rows: 52px; gap: 6px; overflow: hidden; }
      .cmd-cell { position: relative; width: 52px; height: 52px; border: 1px solid var(--hud-border); border-radius: 4px; background: rgba(255,255,255,0.04); cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .cmd-cell:hover { background: rgba(255,255,255,0.1); border-color: var(--hud-accent); }
      .cmd-cell.disabled { opacity: 0.35; cursor: not-allowed; }
      .cmd-cell.power-blocked { border-color: rgba(255,110,110,0.85); color: #ff8a8a; opacity: 0.75; }
      .cmd-cell svg { width: 28px; height: 28px; }
      .cmd-cell .cost { position: absolute; bottom: 2px; right: 4px; font-size: 9px; color: #ffdd88; font-weight: 600; }
      .cmd-cell .power { position: absolute; bottom: 2px; left: 4px; font-size: 9px; color: #8fd0ff; font-weight: 700; }
      .cmd-cell .label { position: absolute; top: 2px; left: 4px; font-size: 8px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.04em; }
      .cmd-cell .badge { position: absolute; top: 2px; right: 4px; font-size: 9px; font-weight: 700; color: #8fd0ff; background: rgba(10,14,22,0.85); border-radius: 8px; padding: 1px 5px; z-index: 2; }

      /* Floating text */
      .float-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
      .float-text { position: absolute; font-size: 13px; font-weight: 700; text-shadow: 0 0 4px rgba(0,0,0,0.9); transition: transform 900ms ease-out, opacity 900ms ease-out; }
      .float-text.dmg { color: #ff6e6e; }
      .float-text.credit { color: #ffd863; }
      .float-text.info { color: #8fd0ff; }
      .hud-toast { position: absolute; top: 72px; left: 50%; transform: translateX(-50%); z-index: 40; padding: 8px 12px; border-radius: 6px; background: rgba(10,14,22,0.9); border: 1px solid rgba(255,110,110,0.65); color: #ff9a9a; font-size: 12px; font-weight: 700; letter-spacing: 0.02em; pointer-events: none; opacity: 0; transition: opacity 120ms ease; }
      .hud-toast.show { opacity: 1; }

      /* Playground */
      .playground-panel { position: absolute; top: 58px; right: 16px; z-index: 35; width: 360px; max-height: calc(100vh - 250px); overflow: auto; background: rgba(7, 10, 16, 0.9); border: 1px solid var(--hud-border); border-radius: 8px; padding: 10px; box-shadow: 0 16px 44px rgba(0,0,0,0.35); }
      .playground-panel.with-inspector { right: min(760px, 48vw); }
      .pg-head { display: flex; align-items: start; justify-content: space-between; gap: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(120,140,170,0.22); }
      .pg-title { font-size: 13px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; }
      .pg-sub { margin-top: 2px; font-size: 10px; opacity: 0.58; text-transform: uppercase; letter-spacing: 0.06em; }
      .pg-actions { display: flex; gap: 6px; }
      .pg-btn, .pg-mini { border: 1px solid var(--hud-border); border-radius: 5px; background: rgba(255,255,255,0.06); color: var(--hud-fg); font-size: 11px; font-weight: 700; cursor: pointer; }
      .pg-btn { padding: 6px 8px; }
      .pg-btn:hover, .pg-mini:hover { border-color: var(--hud-accent); background: rgba(111,208,255,0.13); }
      .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .pg-btn.danger:hover { border-color: #ff7777; background: rgba(255,110,110,0.14); }
      .pg-btn.nuke { color: #ffd7aa; border-color: rgba(255,138,85,0.38); }
      .pg-btn.nuke:hover { border-color: #ff9b4a; background: rgba(255,120,48,0.18); }
      .pg-factions { display: grid; gap: 10px; padding-top: 10px; }
      .pg-faction { border: 1px solid color-mix(in srgb, var(--pg-primary) 42%, transparent); border-radius: 6px; padding: 8px; background: rgba(255,255,255,0.035); }
      .pg-faction h3 { margin: 0 0 7px 0; color: var(--pg-primary); font-size: 12px; letter-spacing: 0.04em; }
      .pg-unit-list { display: grid; gap: 5px; }
      .pg-unit { display: grid; grid-template-columns: 1fr 34px 34px; gap: 5px; align-items: center; min-height: 34px; }
      .pg-unit span { min-width: 0; }
      .pg-unit b { display: block; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .pg-unit small { display: block; margin-top: 1px; font-size: 9px; opacity: 0.52; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .pg-mini { height: 28px; color: var(--pg-accent); }
      .playground-inspector { position: absolute; top: 0; right: 0; bottom: 0; z-index: 42; width: min(760px, 48vw); background: #07101a; border-left: 1px solid var(--hud-border); box-shadow: -18px 0 50px rgba(0,0,0,0.38); display: flex; flex-direction: column; }
      .pg-inspector-top { height: 42px; flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--hud-border); background: rgba(10,14,22,0.95); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
      .playground-inspector iframe { flex: 1; width: 100%; border: 0; background: #07101a; }

      /* Game over */
      .game-over { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(4,6,10,0.75); z-index: 20; }
      .game-over .panel { background: var(--hud-bg); border: 1px solid var(--hud-border); padding: 30px 44px; border-radius: 10px; text-align: center; }
      .game-over h2 { margin: 0 0 14px 0; }
      .game-over.victory h2 { color: #7ef5b3; }
      .game-over.defeat h2 { color: #ff7c7c; }

      /* Cursors */
      .cursor-default { cursor: default; }
      .cursor-move { cursor: crosshair; }
      .cursor-attack { cursor: crosshair; }
      .cursor-place { cursor: cell; }

      /* Select box */
      .select-box { position: absolute; z-index: 30; border: 1px solid #7ef5b3; background: rgba(126, 245, 179, 0.12); pointer-events: none; }

      /* Premium Checkers module */
      .checkers-root { position: absolute; inset: 0; overflow: hidden; background: #070403; }
      .checkers-root canvas { position: absolute; inset: 0; z-index: 1; }
      .checkers-root::before { content: ""; position: absolute; inset: 0; background:
        linear-gradient(180deg, rgba(7,4,3,0.15), rgba(7,4,3,0.68)),
        radial-gradient(circle at 50% 38%, rgba(255,188,108,0.18), transparent 32%),
        radial-gradient(circle at 12% 18%, rgba(101,52,24,0.56), transparent 28%),
        radial-gradient(circle at 86% 82%, rgba(45,18,9,0.92), transparent 36%),
        repeating-linear-gradient(92deg, rgba(255,224,165,0.03) 0 1px, transparent 1px 22px),
        url('/assets/checkers/premium-board-bg.svg') center / cover no-repeat,
        linear-gradient(135deg, #180b07, #070302 58%, #1d0e08);
        filter: saturate(1.08); z-index: 0; pointer-events: none;
      }
      .checkers-root::after { content: ""; position: absolute; inset: -20%; background:
        radial-gradient(circle at 22% 32%, rgba(255,218,154,0.1), transparent 14%),
        radial-gradient(circle at 72% 24%, rgba(97,170,255,0.09), transparent 16%),
        radial-gradient(circle at 50% 70%, rgba(255,129,74,0.08), transparent 18%);
        animation: ckAmbient 12s ease-in-out infinite alternate; pointer-events: none; z-index: 0;
      }
      .checkers-root.theme-light { background: #f1dfc4; }
      .checkers-root.theme-light::before { background:
        linear-gradient(180deg, rgba(255,245,225,0.18), rgba(222,175,112,0.3)),
        radial-gradient(circle at 48% 34%, rgba(255,246,215,0.34), transparent 34%),
        radial-gradient(circle at 14% 14%, rgba(204,126,57,0.18), transparent 30%),
        radial-gradient(circle at 86% 80%, rgba(121,73,40,0.22), transparent 34%),
        repeating-linear-gradient(92deg, rgba(91,54,23,0.035) 0 1px, transparent 1px 22px),
        url('/assets/checkers/premium-board-bg.svg') center / cover no-repeat,
        linear-gradient(135deg, #fff0d2, #f1dfc4 58%, #d8b684);
        filter: saturate(0.95) brightness(1.05);
      }
      .checkers-root.theme-light::after { opacity: 0.42; filter: sepia(0.2); }
      .checkers-overlay { position: fixed; inset: 0; z-index: 28; pointer-events: none; }
      .checkers-overlay > * { pointer-events: auto; }
      .checkers-top { position: absolute; top: 14px; left: 16px; right: 16px; min-height: 48px; display: flex; align-items: center; gap: 12px; padding: 8px 14px; border: 1px solid rgba(244,197,132,0.22); border-radius: 999px; background: linear-gradient(180deg, rgba(31,17,10,0.86), rgba(9,5,4,0.7)); box-shadow: 0 12px 32px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.06); backdrop-filter: blur(14px); transition: opacity 360ms ease, transform 360ms ease; }
      .checkers-top > div:first-child { flex: 1; min-width: 150px; }
      .checkers-title { font-size: 13px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; color: #ffd79d; }
      .checkers-sub { margin-top: 1px; font-size: 10px; opacity: 0.56; letter-spacing: 0.06em; }
      .checkers-pill { padding: 7px 10px; border: 1px solid rgba(244,197,132,0.22); border-radius: 999px; background: rgba(255,255,255,0.045); color: #f8e7ce; font-size: 12px; font-weight: 800; }
      .checkers-pill.warn { color: #ffb47d; border-color: rgba(255,138,85,0.34); }
      .ck-row, .ck-actions { display: flex; gap: 7px; }
      .ck-btn { border: 1px solid rgba(244,197,132,0.28); border-radius: 7px; background: linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.035)); color: #f5dec0; padding: 8px 10px; font-size: 11px; font-weight: 850; cursor: pointer; transition: transform 120ms ease, border-color 120ms ease, background 120ms ease; }
      .ck-btn:hover, .ck-btn.active { border-color: #ffd79d; background: rgba(255,215,157,0.14); color: #fff3df; transform: translateY(-1px); }
      .ck-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .ck-btn.wide { width: 100%; text-align: left; }
      .ck-row .ck-btn { flex: 1; }
      .ck-btn.pro { color: #1b0b05; border-color: rgba(255,221,161,0.56); background: linear-gradient(180deg, #ffe0a8, #c9823c); }
      .ck-btn.pro:disabled { opacity: 0.78; cursor: default; color: #251107; }
      .ck-btn.danger { color: #ff9a9a; border-color: rgba(255,108,108,0.4); }
      .ck-btn.danger:hover { background: rgba(255,108,108,0.16); color: #ffd0d0; border-color: #ff9a9a; }
      .ck-stat { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border: 1px solid rgba(244,197,132,0.16); border-radius: 6px; background: rgba(255,255,255,0.035); }
      .ck-stat span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; opacity: 0.58; }
      .ck-stat b { color: #ffd79d; font-variant-numeric: tabular-nums; }

      /* Coach rail — left half hero */
      .ck-coach-rail { position: absolute; left: 16px; top: 72px; bottom: 16px; width: 304px; display: flex; flex-direction: column; gap: 12px; pointer-events: auto; transition: opacity 360ms ease, transform 360ms ease; }
      .ck-coach-card { display: flex; flex-direction: column; gap: 10px; padding: 14px; border: 1px solid rgba(143,208,255,0.28); border-radius: 14px; background: linear-gradient(180deg, rgba(18,32,52,0.82), rgba(9,12,20,0.78)); box-shadow: 0 22px 56px rgba(0,0,0,0.42), inset 0 1px 0 rgba(143,208,255,0.12); backdrop-filter: blur(16px); }
      .ck-persona { display: grid; grid-template-columns: 44px 1fr auto; gap: 10px; align-items: center; }
      .ck-persona-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 950; letter-spacing: 0.02em; color: #050a14; background: var(--persona-accent, #8fd0ff); background-size: cover; background-position: center; box-shadow: 0 0 18px rgba(143,208,255,0.32), inset 0 0 12px rgba(255,255,255,0.34); border: 1px solid rgba(255,255,255,0.22); overflow: hidden; }
      .ck-persona-avatar[data-avatar] { color: transparent; text-shadow: none; }
      .ck-persona-avatar[data-avatar="yara"] { background-image: url('/assets/checkers/generated/avatar-yara.png'); }
      .ck-persona-avatar[data-avatar="dana"] { background-image: url('/assets/checkers/generated/avatar-dana.png'); }
      .ck-persona-avatar[data-avatar="magnus"] { background-image: url('/assets/checkers/generated/avatar-magnus.png'); }
      .ck-persona-meta { min-width: 0; }
      .ck-persona-name { font-size: 13px; font-weight: 950; color: #f3f9ff; letter-spacing: 0.02em; }
      .ck-persona-sub { font-size: 10px; opacity: 0.58; letter-spacing: 0.06em; text-transform: uppercase; }
      .ck-persona-rating { font-size: 11px; font-weight: 900; color: #8fd0ff; padding: 4px 8px; border-radius: 999px; background: rgba(143,208,255,0.12); border: 1px solid rgba(143,208,255,0.28); font-variant-numeric: tabular-nums; }
